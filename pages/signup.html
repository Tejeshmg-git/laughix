<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo-main.png">
    <title>LAUGHIX — Create Your Account</title>
    <meta name="description"
        content="Sign up for LAUGHIX to get access to exclusive comedy specials, early tickets, merch drops, and more.">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        html,
        body {
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .signup-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .signup-container {
            max-width: 450px;
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 36px 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .signup-container::-webkit-scrollbar {
            display: none;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signup-header .brand-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            text-decoration: none;
        }

        .signup-header .brand-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.5));
        }

        .signup-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .signup-header p {
            color: var(--text-secondary);
        }

        .signup-form .form-group {
            margin-bottom: 20px;
        }

        .signup-form .form-row {
            display: flex;
            gap: 16px;
        }

        .signup-form .form-row .form-group {
            flex: 1;
        }

        .signup-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .signup-form input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .signup-form input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(0, 242, 255, 0.1);
        }

        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 28px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .terms-check input {
            width: auto;
            margin-top: 3px;
        }

        .terms-check a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .terms-check a:hover {
            text-decoration: underline;
        }

        .signup-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            margin-bottom: 24px;
            justify-content: center;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .signup-footer {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .signup-footer a {
            color: var(--accent-blue);
            font-weight: 600;
            text-decoration: none;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        .back-to-home {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            z-index: 100;
        }

        .back-to-home:hover {
            color: var(--text-primary);
            transform: translateX(-5px);
        }

        @media (max-width: 500px) {
            .back-to-home {
                top: 20px;
                left: 20px;
                font-size: 0.85rem;
            }

            .signup-container {
                padding: 32px 24px;
                max-height: 85vh;
            }

            .signup-header {
                margin-bottom: 24px;
            }

            .signup-header h1 {
                font-size: 2rem;
            }

            .signup-header .brand-logo {
                width: 40px;
                height: 40px;
            }

            .signup-form .form-row {
                flex-direction: column;
                gap: 0;
            }

            .signup-btn {
                padding: 14px;
                font-size: 1rem;
            }

            .social-btn {
                padding: 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <a href="../index.html" class="back-to-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="signup-page">
        <div class="signup-container" data-aos="zoom-in">
            <div class="signup-header">
                <a href="../index.html" class="brand-name">
                    <img src="../assets/images/logo/logo-main.png" alt="LAUGHIX Logo" class="brand-logo">
                    <h1>LAUGHIX</h1>
                </a>
                <p>Join the comedy revolution.</p>
            </div>

            <form class="signup-form"
                onsubmit="event.preventDefault(); alert('🎉 Account created! Welcome to LAUGHIX!')">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Re-enter your password" required
                        minlength="8">
                </div>

                <label class="terms-check">
                    <input type="checkbox" required>
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>

                <button type="submit" class="btn btn-primary signup-btn">
                    Create Account
                </button>

                <div class="divider" style="display: flex; align-items: center; gap: 10px; margin: 24px 0;">
                    <span style="flex: 1; height: 1px; background: var(--glass-border);"></span>
                    <span style="font-size: 0.8rem; color: var(--text-muted);">OR</span>
                    <span style="flex: 1; height: 1px; background: var(--glass-border);"></span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fa-brands fa-google"></i> Sign up with Google
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fa-brands fa-apple"></i> Sign up with Apple
                    </button>
                </div>
            </form>

            <div class="signup-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>
</body>

</html>
