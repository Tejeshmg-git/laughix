<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo-main.png">
    <title>LAUGHIX — Login to Your Account</title>
    <meta name="description"
        content="Login to your LAUGHIX account to access exclusive comedy specials, early tickets, and more.">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        html,
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        @media (min-width: 769px) {

            html,
            body {
                height: 100vh;
                overflow: hidden;
            }
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            position: relative;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 36px 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        @media (min-width: 769px) {
            .login-container {
                max-height: 90vh;
                overflow-y: auto;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            .login-container::-webkit-scrollbar {
                display: none;
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .brand-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .login-header .brand-name:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .login-header .brand-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.5));
        }

        .login-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-secondary);
        }

        .login-form .form-group {
            margin-bottom: 24px;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .login-form input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(0, 242, 255, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .remember-me input {
            width: auto;
        }

        .forgot-password {
            color: var(--accent-blue);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            margin-bottom: 24px;
            justify-content: center;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .login-footer a {
            color: var(--accent-blue);
            font-weight: 600;
            text-decoration: none;
        }

        .back-to-home {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            z-index: 100;
        }

        .back-to-home:hover {
            color: var(--text-primary);
            transform: translateX(-5px);
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 500px) {
            .back-to-home {
                top: 20px;
                left: 20px;
                font-size: 0.85rem;
            }

            .login-container {
                padding: 32px 20px;
                max-height: none;
            }

            .login-header {
                margin-bottom: 24px;
            }

            .login-header h1 {
                font-size: 2rem;
            }

            .login-header .brand-logo {
                width: 40px;
                height: 40px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 24px;
            }

            .login-btn {
                padding: 12px;
                font-size: 1.05rem;
                border-radius: var(--border-radius);
            }

            .social-btn {
                padding: 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <a href="../index.html" class="back-to-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-page">
        <div class="login-container" data-aos="zoom-in">
            <div class="login-header">
                <a href="../index.html" class="brand-name">
                    <img src="../assets/images/logo/logo-main.png" alt="LAUGHIX Logo" class="brand-logo">
                    <h1 style="margin-bottom: 0;">LAUGHIX</h1>
                </a>
                <p>Welcome back, legend.</p>
            </div>

            <form class="login-form" onsubmit="event.preventDefault(); alert('🚀 Login successful! Redirecting...')">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    Sign In
                </button>

                <div class="divider" style="display: flex; align-items: center; gap: 10px; margin: 24px 0;">
                    <span style="flex: 1; height: 1px; background: var(--glass-border);"></span>
                    <span style="font-size: 0.8rem; color: var(--text-muted);">OR</span>
                    <span style="flex: 1; height: 1px; background: var(--glass-border);"></span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fa-brands fa-google"></i> Continue with Google
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fa-brands fa-apple"></i> Continue with Apple
                    </button>
                </div>
            </form>

            <div class="login-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>
</body>

</html>
