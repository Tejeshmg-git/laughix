<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo-main.png">
    <title>LAUGHIX — Login to Your Account</title>
    <meta name="description"
        content="Login to your LAUGHIX account to access exclusive comedy specials, early tickets, and more.">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            background: var(--bg-primary);
        }

        .auth-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        [dir="rtl"] .auth-controls {
            right: auto;
            left: 20px;
        }

        .auth-controls .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-controls .control-btn:hover {
            border-color: var(--accent-blue);
            box-shadow: var(--glow-blue);
            transform: translateY(-2px);
        }

        .back-to-home {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 100;
            transition: var(--transition);
        }

        [dir="rtl"] .back-to-home {
            left: auto;
            right: 20px;
        }

        [dir="rtl"] .back-to-home i {
            transform: rotate(180deg);
        }

        .back-to-home:hover {
            color: var(--accent-blue);
            transform: translateX(-5px);
        }

        [dir="rtl"] .back-to-home:hover {
            transform: translateX(5px);
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .auth-header {
            margin-bottom: 32px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            text-decoration: none;
        }

        .auth-logo img {
            width: 40px;
            height: 40px;
        }

        .auth-logo span {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .auth-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .auth-form {
            text-align: left;
        }

        [dir="rtl"] .auth-form {
            text-align: right;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .auth-form input:focus {
            border-color: var(--accent-blue);
            box-shadow: var(--glow-blue);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 16px;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        .form-extra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--accent-orange);
            font-weight: 600;
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-footer {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-link {
            color: var(--accent-orange);
            font-weight: 700;
            text-decoration: none;
        }

        /* --- Theme Colors --- */
        [data-theme="light"] .auth-card {
            background: var(--bg-secondary);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .social-btn {
            background: #fff;
        }

        /* --- RTL Mirroring --- */
        [dir="rtl"] .form-extra {
            flex-direction: row-reverse;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-header h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .social-auth {
                grid-template-columns: 1fr;
            }

            .auth-controls {
                top: 10px;
                right: 10px;
            }

            [dir="rtl"] .auth-controls {
                left: 10px;
            }

            .back-to-home {
                top: 15px;
                left: 10px;
            }

            [dir="rtl"] .back-to-home {
                right: 10px;
            }

            .auth-header h2 {
                font-size: 1.6rem;
            }

            .auth-card {
                border-radius: 16px;
            }
        }

        @media (max-width: 320px) {
            .auth-card {
                padding: 24px 16px;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <div class="auth-controls">
        <button class="control-btn" id="theme-toggle" title="Toggle Theme">
            <i class="fa-solid fa-sun"></i>
        </button>
        <button class="control-btn" id="rtl-toggle" title="Toggle RTL">
            <i class="fa-solid fa-right-left"></i>
        </button>
    </div>

    <a href="../index.html" class="back-to-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-page">
        <div class="auth-card" data-aos="zoom-in">
            <header class="auth-header">
                <a href="../index.html" class="auth-logo">
                    <img src="../assets/images/logo/logo-main.png" alt="Logo" class="brand-logo">
                    <span>LAUGHIX</span>
                </a>
                <h2>Welcome <span class="highlight">Back</span> 👋</h2>
                <p>Access your comedy pass and dashboard.</p>
            </header>

            <div class="social-auth">
                <button class="social-btn"><i class="fa-brands fa-google"></i> Google</button>
                <button class="social-btn"><i class="fa-brands fa-apple"></i> Apple</button>
            </div>

            <div class="auth-divider">OR</div>

            <form class="auth-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye-slash toggle-password"></i>
                    </div>
                </div>

                <div class="form-extra">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary submit-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Create Account</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // Password Toggle Logic
        const togglePassword = document.querySelector('.toggle-password');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>

</html>
