<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo-main.png">
    <title>Coming Soon | LAUGHIX Global Tour</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        body,
        html {
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0F0F1A;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .cs-page {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cs-badge {
            display: block;
            width: fit-content;
            padding: 10px 24px;
            background: rgba(0, 212, 255, 0.05);
            color: #00D4FF;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            margin-bottom: 32px;
            animation: pulse-glow 2s infinite;
        }

        .brand-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: #fff;
            margin-bottom: 40px;
            opacity: 0.9;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .brand-name:hover {
            opacity: 1;
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.5));
        }

        .cs-title {
            font-size: clamp(2.5rem, 7vw, 4.2rem);
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #fff, #A0A0B8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 15px 20px;
            display: inline-block;
        }

        .cs-description {
            color: #A0A0B8;
            font-size: clamp(1rem, 2vw, 1.2rem);
            margin-bottom: 48px;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 60px;
        }

        .cd-item {
            min-width: 100px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            animation: float 4s ease-in-out infinite alternate;
        }

        .cd-item span {
            display: block;
            font-size: 2.5rem;
            font-weight: 800;
            color: #00D4FF;
        }

        .cd-item label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6B6B80;
        }

        .futuristic-scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00D4FF, transparent);
            box-shadow: 0 0 15px #00D4FF;
            animation: scanning 4s linear infinite;
            z-index: 5;
            opacity: 0.3;
        }

        @keyframes scanning {
            0% {
                top: 0;
                opacity: 0;
            }

            5% {
                opacity: 0.5;
            }

            95% {
                opacity: 0.5;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
                border-color: rgba(0, 212, 255, 0.3);
            }

            50% {
                box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
                border-color: rgba(0, 212, 255, 0.8);
            }

            100% {
                box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
                border-color: rgba(0, 212, 255, 0.3);
            }
        }

        @keyframes float {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-15px);
            }
        }

        .btn-home {
            padding: 18px 48px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-home:hover {
            background: #fff;
            color: #0F0F1A;
            transform: scale(1.05);
        }

        .background-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            background-image:
                linear-gradient(rgba(0, 212, 255, 1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 1) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        @media (max-width: 600px) {
            .countdown-grid {
                gap: 12px;
            }

            .cd-item {
                min-width: 70px;
                padding: 15px;
            }

            .cd-item span {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="background-lines"></div>
    <div class="futuristic-scanner"></div>

    <div class="cs-page">
        <a href="../index.html" class="brand-name">
            <img src="../assets/images/logo/logo-main.png" alt="LAUGHIX Logo" class="brand-logo">
            LAUGHIX
        </a>
        <div class="cs-badge">Phase 2.0 Uploading</div>
        <h1 class="cs-title">Something Big is Coming</h1>
        <p class="cs-description">We're building the next generation of digital comedy experiences. The wait will be
            worth the laughs.</p>

        <div class="countdown-grid">
            <div class="cd-item">
                <span id="days">12</span>
                <label>Days</label>
            </div>
            <div class="cd-item" style="animation-delay: 0.5s">
                <span id="hours">08</span>
                <label>Hours</label>
            </div>
            <div class="cd-item" style="animation-delay: 1s">
                <span id="minutes">45</span>
                <label>Mins</label>
            </div>
            <div class="cd-item" style="animation-delay: 1.5s">
                <span id="seconds">22</span>
                <label>Secs</label>
            </div>
        </div>

        <a href="../index.html" class="btn-home">
            <i class="fa-solid fa-arrow-left"></i> Take Me Home
        </a>
    </div>

    <!-- Countdown Logic -->
    <script>
        function updateTimer() {
            const counts = ['days', 'hours', 'minutes', 'seconds'];
            counts.forEach(id => {
                const el = document.getElementById(id);
                let val = parseInt(el.innerText);
                if (id === 'seconds') {
                    val--;
                    if (val < 0) {
                        val = 59;
                        // update other fields would go here in a real timer
                    }
                }
                el.innerText = val.toString().padStart(2, '0');
            });
        }
        setInterval(updateTimer, 1000);
    </script>
</body>

</html>
